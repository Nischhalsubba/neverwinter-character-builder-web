<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc"><title id="title">Neverwinter Character Builder and DPS Calculator</title><desc id="desc">Web character builder for Neverwinter DPS, healer, and tank calculations with ratings, buffs, damage estimates, and formula inspection.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#090907"/><stop offset="1" stop-color="#241b0d"/></linearGradient><linearGradient id="gold" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#d7a83d"/><stop offset="1" stop-color="#ffe19a"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity=".45"/></filter></defs><rect width="1200" height="630" rx="34" fill="url(#bg)"/><circle cx="110" cy="100" r="150" fill="#d7a83d" opacity=".08"/><circle cx="1090" cy="550" r="190" fill="#6d4bc3" opacity=".10"/><g transform="translate(70 72)" font-family="Arial, sans-serif"><rect width="66" height="66" rx="18" fill="url(#gold)"/><path d="M20 46 L33 14 L46 46 L33 39 Z" fill="#151007"/><text x="88" y="31" font-size="34" font-weight="800" fill="#f6eddb">Neverwinter Character Builder</text><text x="88" y="57" font-size="16" fill="#d7c9ad">DPS, healer, and tank calculations in the browser.</text></g><g transform="translate(70 190)" font-family="Arial, sans-serif"><text font-size="48" font-weight="800" fill="#f6eddb">Build smarter. Inspect every formula.</text><text y="46" font-size="21" fill="#b7aa91">A web version of the NW Char Builder workbook with clearer sections and local build files.</text><g transform="translate(0 96)"><rect width="180" height="50" rx="25" fill="#8a5c12"/><text x="90" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="white">DPS calculator</text><rect x="194" width="180" height="50" rx="25" fill="#2f6b45"/><text x="284" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="white">Healer calculator</text><rect x="388" width="180" height="50" rx="25" fill="#3c4f86"/><text x="478" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="white">Tank calculator</text></g><g transform="translate(0 190)"><text font-size="17" font-weight="700" fill="#ffe19a">Workbook-derived formulas</text><text x="220" font-size="17" fill="#e8dfcf">with visible dependencies and manual inputs</text><text y="36" font-size="17" font-weight="700" fill="#9ed6a1">Local JSON builds</text><text x="145" y="36" font-size="17" fill="#e8dfcf">for import, export, and repeatable comparisons</text><text y="72" font-size="17" font-weight="700" fill="#bca6ff">Static web app</text><text x="124" y="72" font-size="17" fill="#e8dfcf">that runs without a backend account</text></g></g><g transform="translate(720 62)" filter="url(#shadow)" font-family="Arial, sans-serif"><rect width="420" height="506" rx="28" fill="#11110d" stroke="#514423"/><rect x="20" y="20" width="380" height="74" rx="16" fill="#1d1b14"/><text x="38" y="45" font-size="11" font-weight="700" fill="#b7aa91">FINAL RESULTS</text><text x="38" y="74" font-size="28" font-weight="800" fill="#ffe19a">89,420 Combined Rating</text><g transform="translate(20 112)"><rect width="116" height="92" rx="14" fill="#171610" stroke="#514423"/><text x="14" y="25" font-size="10" fill="#b7aa91">POWER</text><text x="14" y="58" font-size="25" font-weight="800" fill="#ffe19a">78,600</text><rect x="132" width="116" height="92" rx="14" fill="#171610" stroke="#514423"/><text x="146" y="25" font-size="10" fill="#b7aa91">CRITICAL</text><text x="146" y="58" font-size="25" font-weight="800" fill="#ffe19a">82.4%</text><rect x="264" width="116" height="92" rx="14" fill="#171610" stroke="#514423"/><text x="278" y="25" font-size="10" fill="#b7aa91">DAMAGE</text><text x="278" y="58" font-size="25" font-weight="800" fill="#74b977">1.94M</text></g><g transform="translate(20 224)"><rect width="380" height="188" rx="16" fill="#151510" stroke="#342f20"/><text x="16" y="28" font-size="11" font-weight="700" fill="#d7c9ad">MANUAL GEAR AND STAT BONUSES</text><g font-size="11"><text x="16" y="62" fill="#b7aa91">Power rating</text><rect x="210" y="44" width="150" height="28" rx="8" fill="#0d0d0a" stroke="#514423"/><text x="342" y="63" text-anchor="end" fill="#f6eddb">52,000</text><text x="16" y="98" fill="#b7aa91">Combat Advantage</text><rect x="210" y="80" width="150" height="28" rx="8" fill="#0d0d0a" stroke="#514423"/><text x="342" y="99" text-anchor="end" fill="#f6eddb">48,500</text><text x="16" y="134" fill="#b7aa91">Team buff bonus</text><rect x="210" y="116" width="150" height="28" rx="8" fill="#251a0a" stroke="#866323"/><text x="342" y="135" text-anchor="end" fill="#ffe19a">+18.5%</text><text x="16" y="170" fill="#b7aa91">Estimated final hit</text><text x="342" y="170" text-anchor="end" font-size="18" font-weight="800" fill="#74b977">1,942,660</text></g></g><g transform="translate(20 432)"><rect width="112" height="42" rx="21" fill="#d7a83d"/><text x="56" y="27" text-anchor="middle" font-size="12" font-weight="800" fill="#151007">DPS</text><rect x="134" width="112" height="42" rx="21" fill="#262216"/><text x="190" y="27" text-anchor="middle" font-size="12" font-weight="700" fill="#d7c9ad">HEAL</text><rect x="268" width="112" height="42" rx="21" fill="#262216"/><text x="324" y="27" text-anchor="middle" font-size="12" font-weight="700" fill="#d7c9ad">TANK</text></g></g></svg>